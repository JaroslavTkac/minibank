spring.application.name=minibank

# Default in-memory database configuration
spring.datasource.url=jdbc:h2:mem:minibank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate defaults for local development
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL init disabled by default (can be enabled via profile)
spring.sql.init.mode=never
